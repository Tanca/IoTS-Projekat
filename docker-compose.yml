version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
      POSTGRES_DB: iot_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_seed:
    build:
      context: ./db
      dockerfile: Dockerfile.seed
    volumes:
      - ./dataset.csv:/app/dataset.csv
    environment:
      DATABASE_URL: postgresql://iot_user:iot_password@db:5432/iot_db
    depends_on:
      db:
        condition: service_healthy

  rest_api:
    build: ./rest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://iot_user:iot_password@db:5432/iot_db
    depends_on:
      db:
        condition: service_healthy

  graphql_api:
    build: ./graphql
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://iot_user:iot_password@db:5432/iot_db
    depends_on:
      db:
        condition: service_healthy

  grpc_api:
    build: ./grpc
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: postgresql://iot_user:iot_password@db:5432/iot_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
